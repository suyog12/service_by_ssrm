name: Service by SSRM — Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      APP_NAME: Service by SSRM
      APP_VERSION: 1.0.0
      DEBUG: "False"
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: 587
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAILS_FROM_EMAIL: ${{ secrets.EMAILS_FROM_EMAIL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests and generate Excel report
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Find Excel report
        id: find_excel
        working-directory: backend
        if: always()
        run: |
          EXCEL=$(ls test_results_*.xlsx 2>/dev/null | tail -1)
          if [ -z "$EXCEL" ]; then
            echo "No Excel file found"
            echo "excel_file=" >> $GITHUB_OUTPUT
          else
            echo "excel_file=$EXCEL" >> $GITHUB_OUTPUT
            echo "Found: $EXCEL"
          fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            backend/test_results_*.xlsx
            backend/test-results.xml
          retention-days: 90

      - name: Send email with results
        if: always() && steps.find_excel.outputs.excel_file != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Service by SSRM — Tests #${{ github.run_number }} (${{ job.status }})"
          to: mainalisuyog0@gmail.com
          from: "Service by SSRM CI <${{ secrets.SMTP_USER }}>"
          body: |
            Test run completed for Service by SSRM.

            Branch:     ${{ github.ref_name }}
            Commit:     ${{ github.sha }}
            Run:        #${{ github.run_number }}
            Status:     ${{ job.status }}
            Triggered:  ${{ github.event_name }}

            The full Excel report is attached.

            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: backend/${{ steps.find_excel.outputs.excel_file }}

      - name: Write job summary
        if: always()
        run: |
          echo "## Test Results — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Excel report and JUnit XML available in run artifacts." >> $GITHUB_STEP_SUMMARY